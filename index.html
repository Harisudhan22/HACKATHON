<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<link rel="stylesheet" href="login.css">
<link rel="shortcut icon" href="icon.jpeg">
<script src="https://unpkg.com/ionicons@7.1.0/dist/ionicons.js"></script>

</head>

<body>

<header>
<div class="logo">
    <img src="logo.png" alt="Portal Logo">
</div>



<nav class="navigation">

<a href="#" class="ho">Home</a>

<a href="about.html">About</a>

<div class="dropdown">

<a href="#" class="nav-link" >Services ▾</a>

<div class="dropdown-menu">
<a href="#">PDF Storage</a>
<a href="#">Bookmark Manager</a>
<a href="#">Password Manager</a>
<a href="#">Notes Organizer</a>
</div>

</div>

<div class="dropdown">
<a href="#" class="con">Contact</a>

<div class="dropdown-menu contact-menu">

<p><strong>Name:</strong> Harisudhan</p>
<p><strong>Phone:</strong> +91 9876543210</p>
<p><strong>Email:</strong> example@email.com</p>

</div>
</div>

<button class="btnlogin-popup">Login</button>

</nav>

</header>


<div class="wrapper">
      <span class="icon-close"><ion-icon name="close-outline"></ion-icon></span>

<!-- LOGIN FORM -->

<div class="form-box login">

<h2>Login</h2>

<form id="loginForm">

<div class="input-box">
     <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>

<input type="email" id="loginEmail" required>
<label>Email</label>

</div>


<div class="input-box">
    <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>

<input type="password" id="loginPassword" required>
<label>Password</label>

<ion-icon name="eye-off-outline" class="toggle-password"></ion-icon>

</div>


<div class="remember-forgot">

<label><input type="checkbox">Remember me</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit" class="btn">Login</button>

<div class="login-register">

<p>Don't have an account?

<a href="#" class="register-link">Register</a>

</p>

</div>

</form>

</div>


<!-- REGISTER FORM -->

<div class="form-box register">

<h2>Register</h2>

<form id="registerForm">

<div class="input-box">

<input type="email" id="registerEmail" required>
<label>Email</label>

</div>

<div class="input-box">

<input type="password" id="registerPassword" required>
<label>Password</label>

</div>

<button type="submit" class="btn">Register</button>

<div class="login-register">

<p>Already have account?

<a href="#" class="login-link">Login</a>

</p>

</div>

</form>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
